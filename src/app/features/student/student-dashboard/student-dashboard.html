<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-16">
  <div class="text-center max-w-3xl mx-auto mb-16 relative">
    <div class="inline-block relative">
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-text-dark tracking-tight mb-4 relative z-10">
        مرحباً بك في منصة علم
      </h1>
      <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-2 bg-main rounded-full shadow-[0_4px_12px_rgba(37,99,235,0.3)]"></div>
    </div>
    <p class="text-lg sm:text-xl text-text-muted font-medium leading-relaxed mt-8">
      اختر وجهتك القادمة للاستمرار في مسيرتك التعليمية بكل سهولة.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 lg:gap-12 max-w-4xl mx-auto">
    <!-- كارد المواد -->
    <a [routerLink]="['/main/student/home-department']" class="block group focus:outline-none focus:ring-2 focus:ring-main rounded-3xl" aria-label="الانتقال إلى المواد الدراسية">
      <div class="h-full bg-surface rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 shadow-[0_8px_30px_rgba(0,0,0,0.04)] hover:shadow-[0_20px_40px_rgba(37,99,235,0.12)] transition-all duration-500 transform group-hover:-translate-y-3 relative flex flex-col items-center justify-center p-10 sm:p-12 text-center">
        <div class="absolute top-0 left-0 right-0 h-40 bg-linear-to-b from-main/10 via-main/5 to-transparent pointer-events-none"></div>
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-main/10 rounded-full blur-2xl group-hover:bg-main/20 transition-colors duration-500"></div>
        
        <div class="w-24 h-24 mb-8 rounded-2xl bg-surface shadow-[0_4px_20px_rgba(37,99,235,0.15)] border border-main/20 flex items-center justify-center text-main transform group-hover:scale-110 group-hover:rotate-6 transition-all duration-500 z-10">
          <i class="pi pi-book text-4xl opacity-90 group-hover:opacity-100"></i>
        </div>

        <h3 class="text-2xl sm:text-3xl font-extrabold text-text-dark group-hover:text-main transition-colors duration-300 z-10 mb-4">
          المواد الدراسية
        </h3>
        <p class="text-text-muted font-medium z-10 text-base sm:text-lg">استعرض المناهج، الفيديوهات، وبنوك الأسئلة والمزيد</p>

        <div class="absolute bottom-0 left-0 right-0 h-1.5 bg-linear-to-r from-transparent via-main to-transparent transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500"></div>
      </div>
    </a>

    <!-- كارد السكاشن -->
    <a [routerLink]="['/main/student/sections']" class="block group focus:outline-none focus:ring-2 focus:ring-sky-500 rounded-3xl" aria-label="الانتقال إلى السكاشن">
      <div class="h-full bg-surface rounded-3xl overflow-hidden border border-gray-100 dark:border-gray-800 shadow-[0_8px_30px_rgba(0,0,0,0.04)] hover:shadow-[0_20px_40px_rgba(14,165,233,0.12)] transition-all duration-500 transform group-hover:-translate-y-3 relative flex flex-col items-center justify-center p-10 sm:p-12 text-center">
        <div class="absolute top-0 left-0 right-0 h-40 bg-linear-to-b from-sky-500/10 via-sky-500/5 to-transparent pointer-events-none"></div>
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-sky-500/10 rounded-full blur-2xl group-hover:bg-sky-500/20 transition-colors duration-500"></div>
        
        <div class="w-24 h-24 mb-8 rounded-2xl bg-surface shadow-[0_4px_20px_rgba(14,165,233,0.15)] border border-sky-500/20 flex items-center justify-center text-sky-600 transform group-hover:scale-110 group-hover:-rotate-6 transition-all duration-500 z-10">
          <i class="pi pi-desktop text-4xl opacity-90 group-hover:opacity-100"></i>
        </div>

        <h3 class="text-2xl sm:text-3xl font-extrabold text-text-dark group-hover:text-sky-600 transition-colors duration-300 z-10 mb-4">
          السكاشن والتطبيقات
        </h3>
        <p class="text-text-muted font-medium z-10 text-base sm:text-lg">استعرض التجارب العملية، وحل الأكواد بالكومبيلر</p>

        <div class="absolute bottom-0 left-0 right-0 h-1.5 bg-linear-to-r from-transparent via-sky-500 to-transparent transform scale-x-0 group-hover:scale-x-100 transition-transform duration-500"></div>
      </div>
    </a>
  </div>
</section>

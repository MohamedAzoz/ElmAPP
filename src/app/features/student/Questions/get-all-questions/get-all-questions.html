<p-confirmDialog></p-confirmDialog>
@if(isLoading()){
  <p-progressSpinner></p-progressSpinner>
}
<section class="min-h-screen bg-gray-50 py-8 px-4 flex flex-col items-center">
  <div class="w-full max-w-4xl flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm">
    <div class="flex items-center gap-2">
      <i class="pi pi-clock text-indigo-600 text-xl"></i>
      <span class="text-2xl font-mono font-bold text-gray-800 tracking-wider">
        {{ quizState.timerString() }}
      </span>
    </div>

    <div class="text-gray-600 font-semibold">
      سؤال {{ currentIndex() + 1 }} من {{ questions().length }}
    </div>
  </div>

  <div class="w-full max-w-4xl mb-8">
    <p-progressBar [value]="progress()" [showValue]="false" styleClass="h-2" color="#4f46e5"></p-progressBar>
  </div>

  <div class="w-full max-w-4xl relative min-h-[400px]">
    @if (currentQuestion(); as question) {
      <app-question-carde
        [question]="question"
        [savedAnswerId]="quizState.getAnswer(question.id!)"
        (answerSelect)="onAnswerSelected($event)"
      />
    } @else {
      <div class="flex justify-center items-center h-64">
        <i class="pi pi-spin pi-spinner text-4xl text-indigo-600"></i>
      </div>
    }
  </div>

  <div class="w-full max-w-4xl flex justify-between mt-8">
    <button
      pButton
      label="السابق"
      icon="pi pi-arrow-right"
      class="p-button-outlined p-button-indigo px-6"
      [disabled]="isFirstQuestion()"
      (click)="prev()">
    </button>

    @if (!isLastQuestion()) {
      <button
        pButton
        label="التالي"
        icon="pi pi-arrow-left"
        iconPos="right"
        class="p-button-primary px-8"
        (click)="next()">
      </button>
    } @else {
      <button
        pButton
        label="إنهاء الاختبار"
        severity="danger"
        class="px-8"
        (click)="confirmEnd($event)">
      </button>
    }
  </div>
</section>

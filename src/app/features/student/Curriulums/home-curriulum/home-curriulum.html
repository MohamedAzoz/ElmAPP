@if (curriulum()) {
  <div class="mt-14 mb-7 text-center grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  <div class="mb-4 p-4 flex items-center justify-center">
    <a
      [routerLink]="[`F`]"
      class="block w-100 rounded-xl"
      aria-label="الانتقال إلى الملخصات"
    >
      <p-card
        class="cursor-pointer  border border-text-muted hover:border-main border-b-8 overflow-hidden rounded-xl shadow-md hover:shadow-accent-soft transition-all duration-300 transform hover:-translate-y-2"
      >
        <ng-template #title>
          <div class="text-center py-3">
            <span
              class="text-lg md:text-xl lg:text-2xl font-semibold text-text-dark"
            >
             ملخصات على المادة
            </span>
          </div>
        </ng-template>
      </p-card>
    </a>
  </div>
  <div class="mb-4 p-4 flex items-center justify-center">
    <a
      [routerLink]="[`QB`]"
      class="block w-100 rounded-xl"
      aria-label="الانتقال إلى بنوك اسئلة"
    >
      <p-card
        class="cursor-pointer border border-text-muted hover:border-main border-b-8 overflow-hidden rounded-xl shadow-md hover:shadow-accent-soft transition-all duration-300 transform hover:-translate-y-2"
      >
        <ng-template #title>
          <div class="text-center py-3">
            <span
              class="text-lg md:text-xl lg:text-2xl font-semibold text-text-dark"
            >
             بنوك الاسئلة
            </span>
          </div>
        </ng-template>
      </p-card>
    </a>
  </div>
  <div class="mb-4 p-4 flex items-center justify-center">
    <a
      [routerLink]="['T']"
      class="block w-100 rounded-xl"
     aria-label="الانتقال إلى الاختبارات"
    >
      <p-card
        class="cursor-pointer border border-text-muted hover:border-main border-b-8 overflow-hidden rounded-xl shadow-md hover:shadow-accent-soft transition-all duration-300 transform hover:-translate-y-2"
      >
        <ng-template #title>
          <div class="text-center py-3">
            <span
              class="text-lg md:text-xl lg:text-2xl font-semibold text-text-dark"
            >
             اعمل اختبار
            </span>
          </div>
        </ng-template>
      </p-card>
    </a>
  </div>
</div>
}

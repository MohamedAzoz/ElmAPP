<div class="min-h-[80vh] flex items-center justify-center bg-gray-50 p-4">
  <p-card class="w-full max-w-xl shadow-2xl border-0 rounded-3xl overflow-hidden animate-fadein">
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 rounded-full mb-4"
      >
        <i class="pi pi-bolt text-indigo-600 text-4xl"></i>
      </div>
      <h1 class="text-3xl font-black text-gray-800">تجهيز الاختبار</h1>
      <p class="text-gray-500 mt-2">اختر البنك وحدد عدد الأسئلة لتبدأ التحدي</p>
    </div>

    <div class="flex flex-col gap-8 px-4">
      <div class="flex flex-col gap-2">
        <label class="font-bold text-gray-700 mr-2">بنك الأسئلة المتاح</label>
        <p-select
          [options]="bankFacade.questionBanks()"
          [(ngModel)]="selectedBank"
          optionLabel="name"
          placeholder="اختر بنك الأسئلة"
          class="w-full custom-select"
          styleClass="w-full rounded-xl border-gray-300 shadow-sm"
          [loading]="bankFacade.isQuestionBanktLoading()"
        >
          <ng-template let-bank pTemplate="item">
            <div class="flex justify-between items-center w-full">
              <span>{{ bank.name }}</span>
            </div>
          </ng-template>
        </p-select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="font-bold text-gray-700 mr-2">عدد الأسئلة المطلوبة</label>
        <div class="p-inputgroup w-full">
          <span class="p-inputgroup-addon bg-white border-e-0 rounded-s-xl">
            <i class="pi pi-list"></i>
          </span>
          <p-inputNumber
            [(ngModel)]="numQuestions"
            [min]="1"
            [max]="bankFacade.countQuestionsInBank() || 10"
            [showButtons]="true"
            buttonLayout="horizontal"
            spinnerMode="horizontal"
            inputStyleClass="text-center border-x-0"
            class="w-full"
            styleClass="w-full"
            incrementButtonClass="p-button-secondary rounded-e-xl"
            decrementButtonClass="p-button-secondary"
            incrementButtonIcon="pi pi-plus"
            decrementButtonIcon="pi pi-minus"
          />
        </div>
        @if (selectedBank()) {
          <small class="text-indigo-600 font-medium mr-2">
            * الحد الأقصى المتاح في هذا البنك: {{ bankFacade.countQuestionsInBank() }} سؤال
          </small>
        }
      </div>

      <div class="mt-4">
        <p-button
          label="ابدأ الاختبار الآن"
          icon="pi pi-play"
          severity="primary"
          class="w-full"
          styleClass="w-full py-4 text-xl font-bold rounded-2xl shadow-lg transition-transform hover:scale-[1.02]"
          (onClick)="onStart()"
          [loading]="testFacade.isStarting()"
        />
      </div>
    </div>

    <ng-template #footer>
      <div class="text-center text-gray-400 text-sm pb-4">
        <i class="pi pi-info-circle mr-1"></i>
        سيتم إنشاء جلسة اختبار خاصة بك فور الضغط على ابدأ
      </div>
    </ng-template>
  </p-card>
</div>

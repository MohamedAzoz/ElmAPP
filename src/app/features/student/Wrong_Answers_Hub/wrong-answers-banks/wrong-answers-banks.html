<div class="grid gap-2 sm:gap-3 lg:gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3">
  @for (bank of banks; track bank.bankId) {
    <button
      type="button"
      class="w-full rounded-2xl sm:rounded-3xl border p-3 sm:p-5 text-right shadow-sm transition-all duration-200 hover:-translate-y-0.5 sm:hover:-translate-y-1"
      [class.border-indigo-700]="bank.bankId === selectedBankId"
      [class.bg-indigo-100]="bank.bankId === selectedBankId"
      [class.border-slate-200]="bank.bankId !== selectedBankId"
      (click)="bankSelect.emit(bank.bankId)"
    >
      <div class="flex items-start justify-between gap-2 sm:gap-3">
        <div class="min-w-0">
          <h3 class="text-base sm:text-lg font-semibold truncate" [class]="bank.bankId === selectedBankId ? 'text-main' : 'text-slate-900'">
            {{ bank.bankName }}
          </h3>
          <p class="mt-0.5 sm:mt-1 text-xs sm:text-sm text-slate-500 truncate">
            رقم البنك {{ bank.bankId }}
          </p>
        </div>
        <span
          class="inline-flex items-center rounded-full bg-slate-100 px-2 sm:px-3 py-0.5 sm:py-1 text-xs sm:text-sm font-semibold text-slate-700 shrink-0"
        >
          {{ bank.wrongCount }}
        </span>
      </div>
      <div class="mt-2 sm:mt-4 text-xs sm:text-sm text-slate-500 truncate">
        آخر خطأ: {{ bank.lastAttemptAt | date: 'short' }}
      </div>
    </button>
  }
</div>

<div class="w-full max-w-7xl mx-auto p-2 sm:p-4 md:p-6 flex flex-col gap-4 md:gap-6">
  <!-- Grid Layout: Stacks on mobile/tablet, side-by-side on lg (desktop) screens -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6 items-stretch" dir="ltr">
    
   <!-- Code Editor Component (Spans 2 columns on desktop) -->
    <div class="lg:col-span-2 flex flex-col">
      <div class="bg-[#1e1e1e] border-t border-x border-gray-700 rounded-t-lg px-3 py-2.5 sm:px-4 sm:py-3 flex items-center justify-between gap-2 sm:gap-4" dir="rtl">
        
        <!-- Language Selector Group -->
        <div class="flex items-center gap-2 sm:gap-3">
          <span class="flex items-center gap-1.5 text-gray-300 text-xs sm:text-sm font-semibold select-none">
            <i class="pi pi-code text-amber-500 text-sm sm:text-base"></i>
            <span class="hidden sm:inline">لغة البرمجة:</span>
            <span class="sm:hidden">اللغة:</span>
          </span>
          <select
            [(ngModel)]="selectedLanguage"
            (change)="onLanguageChange()"
            [disabled]="isLoading"
            class="bg-[#2d2d2d] text-white border border-gray-600 rounded-lg px-2 py-1.5 sm:px-3 sm:py-1.5 text-xs sm:text-sm font-semibold focus:outline-none focus:border-amber-500 transition-all cursor-pointer disabled:opacity-50"
            dir="ltr"
          >
            @for(lang of languages; track $index){
              <option [value]="lang.id">
                {{ lang.name }}
              </option>
            }
          </select>
        </div>

        <!-- Run Code Button -->
        <div>
          <button
            (click)="$event.preventDefault(); runCode()"
            [disabled]="isLoading"
            class="px-3.5 py-1.5 sm:px-5 sm:py-2 bg-amber-500 hover:bg-amber-600 active:scale-95 disabled:bg-gray-700 disabled:cursor-not-allowed disabled:scale-100 text-white font-bold text-xs sm:text-sm rounded-lg shadow-md hover:shadow-amber-500/10 transition-all flex items-center gap-1.5 sm:gap-2 cursor-pointer"
          >
            @if (!isLoading) {
              <span class="hidden md:inline">تشغيل الكود</span>
              <span class="md:hidden">تشغيل</span>
              <i class="pi pi-play text-[10px] sm:text-xs"></i>
            } @else {
              <i class="pi pi-spin pi-spinner text-[10px] sm:text-xs"></i>
              <span>جاري التشغيل...</span>
            }
          </button>
        </div>
      </div>

      <!-- Monaco Editor Wrapper -->
      <div
        class="compiler-wrapper w-full border border-gray-700 rounded-b-lg overflow-hidden bg-[#1e1e1e] h-[360px] md:h-[450px] lg:h-[520px]"
        dir="ltr"
      >
        <ngx-monaco-editor
          [options]="editorOptions"
          [(ngModel)]="code"
          (onInit)="initEditor($event)"
          class="w-full h-full block"
        >
        </ngx-monaco-editor>
      </div>
    </div>

    <!-- Terminal Component (Spans 1 column on desktop) -->
    <div class="lg:col-span-1 flex flex-col">
      <div class="bg-[#2d2d2d] border border-gray-700 rounded-t-lg px-3 py-2.5 sm:px-4 sm:py-3 flex items-center justify-between" dir="rtl">
        <span class="text-gray-300 text-xs sm:text-sm font-semibold flex items-center gap-1.5 select-none">
          <i class="pi pi-desktop text-amber-500 text-xs sm:text-sm"></i>
          <span>شاشة المخرجات</span>
        </span>
        <div class="flex gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-red-500 block opacity-70"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 block opacity-70"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-green-500 block opacity-70"></span>
        </div>
      </div>
      
      <!-- Terminal Output Content -->
      <div
        class="terminal-output w-full h-[180px] md:h-[220px] lg:h-[520px] overflow-y-auto p-4 rounded-b-lg font-mono text-sm border-b border-x border-gray-700 whitespace-pre-wrap transition-all duration-200"
        [ngClass]="{
          'bg-[#0d0d0d] text-green-400 border-gray-700': !isCompilerError,
          'bg-[#1a0e0e] text-red-400 border-red-900/50': isCompilerError,
        }"
        dir="auto"
      >
        {{ terminalOutput }}
      </div>
    </div>
 
  </div>
</div>

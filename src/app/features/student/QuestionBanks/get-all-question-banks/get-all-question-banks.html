<section class="max-w-7xl mx-auto px-6 py-10">
 @if (isLoadingColleges()) {
    <div class="flex justify-center py-20">
      <div
        class="animate-spin h-10 w-10 border-4 border-indigo-600 border-t-transparent rounded-full"
      ></div>
    </div>
  } @else {
    @if (questionBanks().length > 0) {
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (questionBank of questionBanks(); track $index) {
          @defer (on viewport; prefetch on idle) {
            <app-questions-bank-carde [questionBank]="questionBank" />
          } @placeholder {
            <p-skeleton width="25rem" height="250px"></p-skeleton>
          }
        }
      </div>
    } @else {
      <div class="text-center py-20 text-gray-500">لا توجد سنوات متاحة حاليًا</div>
    }
  }
</section>

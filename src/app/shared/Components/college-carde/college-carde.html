<div class="mb-4 p-4 flex items-center justify-center">
  <a
    [routerLink]="[college.id, 'years']"
    class="block w-[25rem] focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-xl"
    aria-label="الانتقال إلى سنوات كلية {{ college.name }}"
  >
    <p-card
      class="cursor-pointer overflow-hidden rounded-xl shadow-md hover:shadow-xl transition-all duration-300 transform hover:-translate-y-2"
    >
      <!-- Image -->
      <ng-template #header>
        <div class="relative overflow-hidden group">
          <img
            [alt]="college.name"
            class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-110"
            [src]="college.url"
          />
          <!-- loading="lazy" -->
          <div
            class="absolute inset-0 bg-black/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
          ></div>
        </div>
      </ng-template>

      <!-- Title -->
      <ng-template #title>
        <div class="text-center py-3">
          <span
            class="text-lg font-semibold text-gray-800 group-hover:text-indigo-600 transition-colors"
          >
            {{ college.name }}
          </span>
        </div>
      </ng-template>
    </p-card>
  </a>
</div>

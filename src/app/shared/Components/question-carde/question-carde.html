<section class="question-card">
  <div class="question-panel">
    @if (safeImageUrl) {
      <div class="question-image">
        <img [src]="safeImageUrl" alt="صورة السؤال" loading="lazy" />
      </div>
    }

    <div class="question-header">
      <div class="question-title">
        <h2
          class="text-base md:text-lg lg:text-xl xl:text-2xl font-semibold text-gray-800 pb-1 leading-[1.4]"
        >
          @if (index !== undefined) {
            <span class="question-index">{{ index + 1 }}.</span> {{ question.content }}
          } @else {
            {{ question.content }}
          }
        </h2>
      </div>
    </div>

    @if (question.options?.length) {
      <div class="options-grid">
        @for (option of question.options; track option.id; let i = $index) {
          <button
            type="button"
            class="option-card"
            [ngClass]="getOptionClass(option)"
            (click)="select(option)"
            [disabled]="selectedOptionId !== null && !isTestMode"
          >
            <div class="option-meta">
              <span class="option-badge">{{ optionLabels[i] || i + 1 }}</span>
              <span class="option-text">{{ option.content }}</span>
            </div>

            @if (selectedOptionId === option.id) {
              <div class="option-status">
                <span
                  class="status-icon"
                  [class.correct]="option.isCorrect === true && !isTestMode"
                  [class.wrong]="option.isCorrect === false && !isTestMode"
                  [class.selected]="isTestMode"
                >
                  <i
                    class="pi"
                    [ngClass]="{
                      'pi-check': option.isCorrect !== false,
                      'pi-times': option.isCorrect === false,
                    }"
                  ></i>
                </span>
              </div>
            }
          </button>
        }
      </div>
    } @else {
      <div class="empty-state">لا توجد خيارات متاحة لهذا السؤال.</div>
    }
  </div>
</section>
